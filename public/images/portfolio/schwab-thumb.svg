<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="schwab-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2A3E"/>
      <stop offset="100%" stop-color="#0F1E30"/>
    </linearGradient>
    <linearGradient id="schwab-bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D6FA5"/>
      <stop offset="100%" stop-color="#2C4A6E"/>
    </linearGradient>
    <linearGradient id="schwab-bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A9E7E"/>
      <stop offset="100%" stop-color="#5A7E5E"/>
    </linearGradient>
    <linearGradient id="schwab-bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B4226"/>
      <stop offset="100%" stop-color="#4A2E1A"/>
    </linearGradient>
    <linearGradient id="schwab-bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6F8E"/>
      <stop offset="100%" stop-color="#6A4F6D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#schwab-bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <line x1="80" y1="60" x2="80" y2="400" stroke="#2A3A4E" stroke-width="1"/>
  <line x1="80" y1="400" x2="750" y2="400" stroke="#2A3A4E" stroke-width="1"/>
  <line x1="80" y1="300" x2="750" y2="300" stroke="#2A3A4E" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="200" x2="750" y2="200" stroke="#2A3A4E" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="100" x2="750" y2="100" stroke="#2A3A4E" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Title -->
  <text x="80" y="38" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-weight="700" font-size="20" fill="#FAFAFA">How Charles Schwab Makes Money</text>
  <text x="80" y="56" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#6A8AAA">FY2024 · $23.9B Revenue · 7 Chapters · Wealth Management</text>

  <!-- Vertical bar chart — 4 revenue streams -->
  <!-- Net Interest Income: ~11.2B = 47% -->
  <rect x="110" y="176" width="90" height="224" rx="4" fill="url(#schwab-bar1)" opacity="0.9"/>
  <text x="155" y="168" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#FAFAFA" text-anchor="middle">$11.2B</text>
  <text x="155" y="420" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6A8AAA" text-anchor="middle">Net Interest</text>

  <!-- Asset Management: ~4.4B = 18% -->
  <rect x="240" y="313" width="90" height="87" rx="4" fill="url(#schwab-bar2)" opacity="0.9"/>
  <text x="285" y="305" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#FAFAFA" text-anchor="middle">$4.4B</text>
  <text x="285" y="420" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6A8AAA" text-anchor="middle">Asset Mgmt</text>

  <!-- Trading Revenue: ~3.5B = 15% -->
  <rect x="370" y="330" width="90" height="70" rx="4" fill="url(#schwab-bar3)" opacity="0.9"/>
  <text x="415" y="322" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#FAFAFA" text-anchor="middle">$3.5B</text>
  <text x="415" y="420" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6A8AAA" text-anchor="middle">Trading</text>

  <!-- Bank Deposits / Other: ~4.8B = 20% -->
  <rect x="500" y="304" width="90" height="96" rx="4" fill="url(#schwab-bar4)" opacity="0.9"/>
  <text x="545" y="296" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#FAFAFA" text-anchor="middle">$4.8B</text>
  <text x="545" y="420" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6A8AAA" text-anchor="middle">Other</text>

  <!-- Total callout box -->
  <rect x="620" y="130" width="110" height="80" rx="8" fill="#1E2E42" stroke="#2C4A6E" stroke-width="1.5"/>
  <text x="675" y="158" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#6A8AAA" text-anchor="middle">Total Revenue</text>
  <text x="675" y="188" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-weight="700" font-size="22" fill="#FAFAFA" text-anchor="middle">$23.9B</text>

  <!-- AUM callout box -->
  <rect x="620" y="230" width="110" height="80" rx="8" fill="#1E2E42" stroke="#3D6FA5" stroke-width="1.5"/>
  <text x="675" y="258" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#6A8AAA" text-anchor="middle">Client AUM</text>
  <text x="675" y="288" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-weight="700" font-size="22" fill="#3D6FA5" text-anchor="middle">$9.9T</text>

  <!-- Bottom label -->
  <text x="80" y="468" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#3A4A5E">Interactive · 7 chapters · Recharts + Framer Motion</text>
</svg>
