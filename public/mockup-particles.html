<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDM Particle Constellation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FAF6F1;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .label {
    position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
    background: #1B2A4A; color: white; padding: 0.5rem 1.25rem;
    border-radius: 9999px; font-size: 0.8rem; font-weight: 600; z-index: 10;
  }
  .hero-layout {
    display: flex;
    align-items: center;
    gap: 3rem;
    max-width: 72rem;
    width: 100%;
  }
  .text-side { flex: 1; }
  .text-side .tagline {
    font-size: 0.75rem; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; color: #C4654A; margin-bottom: 1rem;
  }
  .text-side h1 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 3.5rem; font-weight: 700; line-height: 1.1; color: #1B2A4A;
  }
  .text-side .subtitle {
    font-family: 'Lora', Georgia, serif; font-style: italic;
    font-size: 1.25rem; color: #6B7B8D; margin-top: 1.25rem; max-width: 28rem;
  }
  .canvas-side {
    flex-shrink: 0;
    width: 640px;
    height: 420px;
    position: relative;
    cursor: crosshair;
  }
  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }
  @media (max-width: 768px) {
    .hero-layout { flex-direction: column; text-align: center; }
    .canvas-side { width: 100%; max-width: 420px; height: 280px; }
    .text-side h1 { font-size: 2.5rem; }
  }
</style>
</head>
<body>

<div class="label">JDM Particle Constellation — move your mouse over the letters</div>

<div class="hero-layout">
  <div class="text-side">
    <p class="tagline">Marketing &middot; Finance &middot; AI</p>
    <h1>Making the<br>complex clear.</h1>
    <p class="subtitle">The person who understands how money, products, and attention work — and makes it clear for everyone else.</p>
  </div>

  <div class="canvas-side" id="canvasContainer">
    <canvas id="particleCanvas"></canvas>
  </div>
</div>

<script>
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvasContainer');
const dpr = window.devicePixelRatio || 1;
let W, H;

function resize() {
  const rect = container.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ============================
// JDM Letter Points (0-1 space)
// ============================

// Raw coordinates, then scaled 10% smaller from center
const jdmPointsRaw = [
  // ─── J (22 points, indices 0-21) ───
  // Top bar (8 pts, y=0.18)
  {x:0.02,y:0.18},{x:0.055,y:0.18},{x:0.09,y:0.18},{x:0.125,y:0.18},
  {x:0.16,y:0.18},{x:0.195,y:0.18},{x:0.23,y:0.18},{x:0.26,y:0.18},
  // Stem (8 pts, x=0.155)
  {x:0.155,y:0.24},{x:0.155,y:0.30},{x:0.155,y:0.36},{x:0.155,y:0.42},
  {x:0.155,y:0.48},{x:0.155,y:0.54},{x:0.155,y:0.60},{x:0.155,y:0.66},
  // Hook curving left (6 pts)
  {x:0.145,y:0.72},{x:0.12,y:0.77},{x:0.08,y:0.81},
  {x:0.04,y:0.82},{x:0.02,y:0.78},{x:0.02,y:0.72},

  // ─── D / Play Triangle (28 points, indices 22-49) ───
  // Left vertical edge (12 pts, x=0.34)
  {x:0.34,y:0.12},{x:0.34,y:0.19},{x:0.34,y:0.255},{x:0.34,y:0.32},
  {x:0.34,y:0.39},{x:0.34,y:0.455},{x:0.34,y:0.52},{x:0.34,y:0.585},
  {x:0.34,y:0.65},{x:0.34,y:0.72},{x:0.34,y:0.79},{x:0.34,y:0.86},
  // Top diagonal (7 pts, from top-left toward tip)
  {x:0.39,y:0.17},{x:0.43,y:0.22},{x:0.48,y:0.27},
  {x:0.52,y:0.32},{x:0.57,y:0.37},{x:0.61,y:0.42},{x:0.65,y:0.46},
  // Tip cluster (2 pts)
  {x:0.67,y:0.49},{x:0.66,y:0.50},
  // Bottom diagonal (7 pts, from bottom-left toward tip)
  {x:0.39,y:0.81},{x:0.43,y:0.76},{x:0.48,y:0.71},
  {x:0.52,y:0.66},{x:0.57,y:0.60},{x:0.61,y:0.55},{x:0.65,y:0.51},

  // ─── M (30 points, indices 50-79) ───
  // Left stem (10 pts, x=0.76)
  {x:0.76,y:0.18},{x:0.76,y:0.25},{x:0.76,y:0.33},{x:0.76,y:0.40},
  {x:0.76,y:0.47},{x:0.76,y:0.55},{x:0.76,y:0.62},{x:0.76,y:0.69},
  {x:0.76,y:0.77},{x:0.76,y:0.84},
  // Left diagonal to valley (5 pts)
  {x:0.78,y:0.26},{x:0.80,y:0.33},{x:0.82,y:0.40},
  {x:0.84,y:0.47},{x:0.855,y:0.55},
  // Right diagonal from valley (5 pts)
  {x:0.87,y:0.48},{x:0.89,y:0.41},{x:0.91,y:0.34},
  {x:0.93,y:0.27},{x:0.955,y:0.19},
  // Right stem (10 pts, x=0.96)
  {x:0.96,y:0.18},{x:0.96,y:0.25},{x:0.96,y:0.33},{x:0.96,y:0.40},
  {x:0.96,y:0.47},{x:0.96,y:0.55},{x:0.96,y:0.62},{x:0.96,y:0.69},
  {x:0.96,y:0.77},{x:0.96,y:0.84},
];

// Scale 10% smaller, centered on the midpoint of the design
const SCALE = 0.90;
const CX = 0.49, CY = 0.49;
const jdmPoints = jdmPointsRaw.map(p => ({
  x: CX + (p.x - CX) * SCALE,
  y: CY + (p.y - CY) * SCALE,
}));

// Letter group boundaries (for connection drawing)
const GROUPS = [
  [0, 22],   // J
  [22, 50],  // D (play triangle)
  [50, 80],  // M
];

function sameGroup(i, j) {
  for (const [start, end] of GROUPS) {
    if (i >= start && i < end && j >= start && j < end) return true;
  }
  return false;
}

const NUM_PARTICLES = jdmPoints.length; // 80

// Seeded random
function seededRandom(seed) {
  let x = Math.sin(seed * 9301 + 49297) * 233280;
  return x - Math.floor(x);
}

// Scattered starting positions
const scatteredPoints = jdmPoints.map((_, i) => ({
  x: 0.1 + seededRandom(i * 7 + 1) * 0.8,
  y: 0.1 + seededRandom(i * 13 + 5) * 0.8,
}));

// Colors
const NAVY = '#1B2A4A';
const NAVY_RGB = { r: 27, g: 42, b: 74 };

// Mouse state
let mouseX = -9999, mouseY = -9999;
let mouseActive = false;

// Animation state
let formed = false;

// ---- Particles ----

class Particle {
  constructor(i) {
    this.i = i;
    this.x = 0;
    this.y = 0;
    this.targetX = 0;
    this.targetY = 0;
    this.vx = 0;
    this.vy = 0;
    this.baseSize = 3.2 + seededRandom(i * 3 + 99) * 1.0;
    this.size = this.baseSize;
    this.phase = seededRandom(i * 11) * Math.PI * 2;
  }

  initPosition() {
    this.x = scatteredPoints[this.i].x * W;
    this.y = scatteredPoints[this.i].y * H;
    this.targetX = this.x;
    this.targetY = this.y;
  }

  setLetterTarget() {
    this.targetX = jdmPoints[this.i].x * W;
    this.targetY = jdmPoints[this.i].y * H;
  }

  update(time) {
    // Gentle breathing when formed
    let bx = 0, by = 0;
    if (formed) {
      bx = Math.sin(time * 0.0008 + this.phase) * 1.2;
      by = Math.cos(time * 0.0006 + this.phase * 1.3) * 1.2;
    }

    // Spring physics toward target
    const dx = (this.targetX + bx) - this.x;
    const dy = (this.targetY + by) - this.y;
    this.vx += dx * 0.06;
    this.vy += dy * 0.06;
    this.vx *= 0.82;
    this.vy *= 0.82;

    // Mouse repulsion
    if (mouseActive) {
      const mdx = this.x - mouseX;
      const mdy = this.y - mouseY;
      const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
      const RADIUS = 160;
      if (mDist < RADIUS && mDist > 0.5) {
        const force = (1 - mDist / RADIUS) * 14;
        this.vx += (mdx / mDist) * force;
        this.vy += (mdy / mDist) * force;
      }
    }

    this.x += this.vx;
    this.y += this.vy;
    this.size = this.baseSize + Math.sin(time * 0.002 + this.phase) * 0.3;
  }
}

let particles = [];

function initParticles() {
  particles = [];
  for (let i = 0; i < NUM_PARTICLES; i++) {
    const p = new Particle(i);
    p.initPosition();
    particles.push(p);
  }
}

// ---- Mouse Tracking ----

document.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
  mouseActive = (mouseX >= -80 && mouseX <= W + 80 && mouseY >= -80 && mouseY <= H + 80);
});
document.addEventListener('mouseleave', () => { mouseActive = false; });

container.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - rect.left;
  mouseY = e.touches[0].clientY - rect.top;
  mouseActive = true;
}, { passive: false });
container.addEventListener('touchend', () => { mouseActive = false; });

// ---- Init ----

resize();
initParticles();

window.addEventListener('resize', () => {
  resize();
  if (formed) {
    particles.forEach(p => p.setLetterTarget());
  }
});

// Form JDM after 0.8s
setTimeout(() => {
  formed = true;
  particles.forEach(p => p.setLetterTarget());
}, 800);

// ---- Animation Loop ----

function animate() {
  const time = Date.now();
  ctx.clearRect(0, 0, W, H);

  particles.forEach(p => p.update(time));

  // Connection max distance — balanced for readability + constellation feel
  const maxDist = Math.min(W * 0.10, H * 0.18);

  // Draw connections — ONLY within the same letter group
  ctx.lineWidth = 1;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      if (!sameGroup(i, j)) continue;
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const distSq = dx * dx + dy * dy;
      const maxDistSq = maxDist * maxDist;
      if (distSq < maxDistSq) {
        const dist = Math.sqrt(distSq);
        const alpha = (1 - dist / maxDist) * 0.35;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(${NAVY_RGB.r},${NAVY_RGB.g},${NAVY_RGB.b},${alpha})`;
        ctx.stroke();
      }
    }
  }

  // Draw particles
  particles.forEach(p => {
    // Dot
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${NAVY_RGB.r},${NAVY_RGB.g},${NAVY_RGB.b},0.9)`;
    ctx.fill();

    // Glow
    const grad = ctx.createRadialGradient(p.x, p.y, p.size * 0.5, p.x, p.y, p.size * 4);
    grad.addColorStop(0, `rgba(${NAVY_RGB.r},${NAVY_RGB.g},${NAVY_RGB.b},0.10)`);
    grad.addColorStop(1, 'rgba(27,42,74,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
